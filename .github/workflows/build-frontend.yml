name: Build and Test Frontend

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install parent dependencies
        working-directory: frontend
        run: npm install

      - name: Install project dependencies
        working-directory: frontend/expense-tracker
        run: npm install

      - name: Build project
        working-directory: frontend/expense-tracker
        run: npm run build
        env:
          VITE_API_URL: https://expense-tracker-s9zd.onrender.com/api/v1

      - name: Build Success ✅
        run: echo "Frontend build completed successfully! Vercel will deploy automatically."
